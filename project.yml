name: RivaloWatch
options:
  bundleIdPrefix: com.mgeovany.rivalo
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  RivaloWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        UIAppFonts:
          - Michroma-Regular.ttf
          - Rajdhani-Regular.ttf
          - Rajdhani-Medium.ttf
          - Rajdhani-SemiBold.ttf
          - Rajdhani-Bold.ttf
          - SpaceMono-Regular.ttf
          - SpaceMono-Bold.ttf
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: Isotipo
          UIImageRespectsSafeAreaInsets: true
        NSLocationWhenInUseUsageDescription: Rivalo uses your location to suggest courts you have played at before.
        NSHealthShareUsageDescription: Rivalo reads your heart rate, distance and energy during a match to build your performance summary.
        NSHealthUpdateUsageDescription: Rivalo saves each match as a workout in the Health app.
        WKBackgroundModes:
          - workout-processing
    entitlements:
      path: Sources/RivaloWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mgeovany.rivalo.watchkitapp
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_WKApplication: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.mgeovany.rivalo
        INFOPLIST_KEY_CFBundleDisplayName: Rivalo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SKIP_INSTALL: false
