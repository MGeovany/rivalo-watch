name: RivaloWatch
options:
  bundleIdPrefix: com.mgeovany.rivalo
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  RivaloWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mgeovany.rivalo.watchkitapp
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_WKApplication: true
        INFOPLIST_KEY_CFBundleDisplayName: Rivalo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
